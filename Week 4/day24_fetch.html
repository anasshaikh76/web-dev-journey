<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Practice</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        h2 { margin: 25px 0 10px; color: #333; }
        .output {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    
    <h2> Problem 1 - Basic Fetch</h2>
    <button onclick="problem1()">Fetch Data</button>
    <div class="output" id="output1">Click button to fetch..</div>

    <h2>Problem 2 - 15</h2>
    <div id="container"></div>

    <script>

        // Problem 1 — Basic Fetch with .then()

        function problem1() {
        fetch("https://jsonplaceholder.typicode.com/users/1")
            .then(response => response.json())
            .then(data => {
                console.log(data);
                document.getElementById("output1").innerHTML = 
                JSON.stringify(data, null, 2);
            });
        }
        // What's happening: fetch(url) makes a request, .json() converts response to usable data, second .then() gives you the actual data!

        // Problem 2 — Fetch with async/await


        async function problem2() {
            const response = await fetch("https://jsonplaceholder.typicode.com/users/2");
            const data = await response.json();
            console.log(data);
            console.log("Name:", data.name);
            console.log("Email:", data.email);
        }
        problem2();
        // Note: Cleaner than .then() chains — same result, easier to read!

        // Problem 3 — Fetch with try/catch (Error handling)

        async function problem3() {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/users/3");
                const data = await response.json();
                console.log("Success:", data.name);
            } catch (error) {
                console.log("Error fetching:", error);
            }
        }
        problem3();
        // Note: Always wrap fetch in try/catch — network requests can fail (no internet, server down, etc)!

        // Problem 4 — Check response.ok

        async function problem4() {
            const response = await fetch("https://jsonplaceholder.typicode.com/users/4");

            if (response.ok) {
                const data = await response.json();
                console.log("✅ Success:", data.name);
            } else {
                console.log("❌ Request failed:", response.status);
            }
        }
        problem4();
        // Note: response.ok is true for status 200-299. Always check this before trying to use the data!

        // Problem 5 — Fetch a List (Array of items)

        async function problem5() {
            const response = await fetch("https://jsonplaceholder.typicode.com/users");
            const users = await response.json();

            console.log("Total Users:", users.length);
            users.forEach(user => {
                console.log(`${user.id}. ${user.name} - ${user.email}`);
            });
        }
        problem5();

        // Problem 6 — Fetch Posts

        async function problem6() {
            const response = await fetch("https://jsonplaceholder.typicode.com/posts?_limit=5");
            const posts = await response.json();

            posts.forEach(post => {
                console.log(`Post ${post.id}: ${post.title}`);
            });
        }
        problem6();
        // Note: ?_limit=5 is a query parameter — limits the response to only 5 posts!

        // Problem 7 — Display Fetched Data in HTML

        async function problem7() {
            const response = await fetch("https://jsonplaceholder.typicode.com/users?_limit=3");
            const users = await response.json();

            const container = document.getElementById("container");
            container.innerHTML = "";

            users.forEach(user => {
                const div = document.createElement("div");
                div.classList.add("output");
                div.innerHTML = `
                    <strong>${user.name}</strong><br>
                    Email: ${user.email}<br>
                    City: ${user.address.city}
                `;
                container.appendChild(div);
            });
        }
        problem7();
        // Note: This is the real pattern — fetch data, then build HTML elements to display it!

        // Problem 8 — POST Request (Sending data)

        async function problem8() {
            const newPost = {
                title: "My First Post",
                body: "this is the content of my post",
                userId: 1
            };

            const response = await fetch("https://jsonplaceholder.typicode.com/posts", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(newPost)
            })

            const data = await response.json();
            console.log("Created Post:", data)
        }
        problem8();
        // Note: POST sends data TO the server. Notice we use JSON.stringify on the body — this is why JSON skills matter!

        // Problem 9 — PUT Request (Updating data)

        async function problem9() {
            const updatedPost = {
                id: 1,
                title: "Updated Title",
                body: "Updated Body",
                userId: 1
            };

            const response = await fetch("https://jsonplaceholder.typicode.com/posts/1", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updatedPost)
            });

            const data = await response.json();
            console.log("Updated Post:", data);
        }
        problem9();
        
        // Problem 10 — DELETE Request

        async function problem10() {
            const response = await fetch("https://jsonplaceholder.typicode.com/posts/1", {
                method: "DELETE"
            });

            if (response.ok) {
                console.log("✅ Post deleted successfully!");
            } else {
                console.log("❌ Failed to delete!");
            }
        }
        problem10();
        // Note: GET = read, POST = create, PUT = update, DELETE = remove. These 4 are called CRUD operations!

        // Problem 11 — Handling Errors (404, bad URL)

        async function problem11() {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/users/9999");

                if (!response.ok) {
                    throw new Error(`HTTP Error! Status: ${response.status}`);
                }

                const data = await response.json();
                console.log(data);
            } catch (error) {
                console.log("Caught error:", error.message);
            }
        }
        problem11();

        // Problem 12 — Multiple Fetches with Promise.all

        async function problem12() {
            const [usersRes, postsRes, commentRes] = await Promise.all([
                fetch("https://jsonplaceholder.typicode.com/users?_limit=2"),
                fetch("https://jsonplaceholder.typicode.com/posts?_limit=2"),
                fetch("https://jsonplaceholder.typicode.com/comments?_limit=2")
            ]);

            const users = await usersRes.json();
            const posts = await postsRes.json();
            const comments = await commentRes.json();

            console.log("users:", users.length);
            console.log("posts:", posts.length);
            console.log("comments:", comments.length);
        }
        problem12();
        // Note: Fetches all 3 at the SAME TIME instead of one after another — much faster!

        // Problem 13 — Loading State (Real UX pattern)

        async function problem13() {
            const container = document.getElementById("container");
            container.innerHTML = "⏳ Loading...";

            const response = await fetch("https://jsonplaceholder.typicode.com/users/5");
            const user = await response.json();

            container.innerHTML = `
                <div class="output">
                    <strong>${user.name}</strong><br>
                    ${user.company.name}
                </div>
            `;
        }
        problem13();
        // Note: Always show a loading message before data arrives — this is what every real website does!

        // Problem 14 — Search/Filter Fetched Data

        async function problem14() {
            const response = await fetch("https://jsonplaceholder.typicode.com/users");
            const users = await response.json();

            const filtered = users.filter(u => 
                u.address.city.toLowerCase().includes("ville")
            );

            console.log("Filtered users:", filtered.map(u => u.name));

            const found = users.find(u => u.username === "Bret");
            console.log("Found user:", found ? found.name : "Not Found");
        }
        problem14();

        // Problem 15 — Mini Project: User Profile Card Generator

        async function problem15() {
            const container = document.getElementById("container");
            container.innerHTML = "⏳ Loading users...";

            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/users?_limit=5");
                const users = await response.json();

                container.innerHTML = "";

                users.forEach(user => {
                    const card = document.createElement("div");
                    card.classList.add("output");
                    card.innerHTML = `
                        <strong>👤 ${user.name}</strong> (@${user.username})<br>
                        📧 ${user.email}<br>
                        📞 ${user.phone}<br>
                        🏢 ${user.company.name}<br>
                        🌐 ${user.website}
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = "❌ Failed to load users!";
                console.log(error);
            }
        }
        problem15();
    </script>
</body>
</html>
