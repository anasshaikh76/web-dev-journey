<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision</title>

    <style>
        /* day29_browser.html */
        .flex-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 15px 25px;
            border-radius: 8px;
        }
        .flex-nav .logo { color: #e94560; font-weight: bold;}
        .flex-nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .flex-nav ul li { color: white; cursor: pointer;}
        .flex-nav ul li:hover { color: #e94560;;}

        /* 16 — CSS Grid */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .grid-item {
            background: #e94560;
            color: white;
            padding: 25px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
        }

        /* 17 — Responsive Design */

        .resp-card {
            display: flex;
            gap: 20px;
            background: #16213e;
            color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }
        .resp-card .avatar {
            width: 80px;
            height: 80px;
            background: #e94560;;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        @media (max-width: 480px) {
            .resp-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>

    <nav class="flex-nav">
        <div class="logo">MyBrand</div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>

    <div class="grid-layout">
        <div class="grid-item">Card 1</div>
        <div class="grid-item">Card 2</div>
        <div class="grid-item">Card 3</div>
        <div class="grid-item">Card 4</div>
        <div class="grid-item">Card 5</div>
        <div class="grid-item">Card 6</div>
    </div>

    <div class="resp-card">
        <div class="avatar">AS</div>
        <div>
            <h3>Anas Shaikh</h3>
            <p style="color: #aaa;">Web Developer - Hyderabad</p>
        </div>
    </div>

    <h1 id="title">Hello World</h1>
    <button id="btn">Click Me</button>
    <ul id="list"></ul>
</head>

</html>
