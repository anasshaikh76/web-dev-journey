<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ee0000, #cc0000);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #suggestions {
            background: white;
            border-top: 10px;
            margin-top: 5px;
            overflow: hidden;
        }

        .suggestion-items {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            color: black;
        }

        .suggestion-item:hover {
            background: #f0f0f0;
        }

        input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 30px;
            background: #333;
            color: white;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #555;
        }

        .random-btn {
            background: #f39c12;
            width: 100%;
            margin-bottom: 20px;
        }

        .random-btn:hover {
            background: #e67e22;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .card.show {
            display: block;
        }

        .poke-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .poke-name {
            font-size: 26px;
            font-weight: bold;
            text-transform: capitalize;
            color: #333;
        }

        .poke-id {
            font-size: 18px;
            color: #999;
            font-weight: bold;
        }

        .poke-images {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: #f5f5f5;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .poke-images img {
            width: 120px;
            height: 120px;
        }

        .types {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-badge {
            padding: 6px 18px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            text-transform: capitalize;
        }

        .stats {
            margin-bottom: 15px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .stat-label {
            width: 90px;
            text-transform: capitalize;
            color: #555;
            font-weight: bold;
        }

        .stat-bar-bg {
            flex: 1;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 0 10px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            background: #3498db;
            border-radius: 5px;
            transition: width 0.5s;
        }

        .stat-value {
            width: 30px;
            text-align: right;
            font-weight: bold;
            color: #333;
        }

        .abilities {
            font-size: 14px;
            color: #555;
        }

        .abilities strong {
            color: #333;
        }

        .loading,
        .error {
            text-align: center;
            color: white;
            font-size: 18px;
            margin: 20px 0;
            display: none;
        }

        .loading.show,
        .error.show {
            display: block;
        }

        .history {
            margin-top: 20px;
        }

        .history h3 {
            color: white;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            text-transform: capitalize;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {

            body {
                padding: 15px 10px;
            }

            .container {
                max-width: 100%;
            }

            h1 {
                font-size: 28px;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box input,
            .search-box button {
                width: 100%;
            }

            .card {
                padding: 15px;
            }

            .poke-header {
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }

            .poke-name {
                font-size: 22px;
            }

            .poke-images {
                flex-wrap: wrap;
                gap: 15px;
            }

            .poke-images img {
                width: 100px;
                height: 100px;
            }

            .stat-row {
                font-size: 12px;
            }

            .stat-label {
                width: 70px;
            }

            .history-list {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚡ Pokédex</h1>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter Pokémon name or ID...">
            <button onclick="searchPokemon()">Search</button>
        </div>

        <div id="suggestions"></div>

        <button class="random-btn" onclick="randomPokemon()">🎲 Random Pokémon</button>

        <p class="loading" id="loading">⏳ Loading...</p>
        <p class="error" id="error">❌ Pokémon not found! Try another name.</p>

        <div class="card" id="card">
            <div class="poke-header">
                <span class="poke-name" id="pokeName"></span>
                <span class="poke-id" id="pokeId"></span>
            </div>
            <div class="poke-images">
                <img id="pokeFront" src="" alt="front">
                <img id="pokeBack" src="" alt="back">
            </div>
            <div class="types" id="types"></div>
            <div class="stats" id="stats"></div>
            <div class="abilities" id="abilities"></div>
        </div>

        <div class="history">
            <h3>Recent History:</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>

        let pokemonNames = [];

        // Type colors for badges
        const typeColors = {
            normal: "#A8A878", fire: "#F08030", water: "#6890F0",
            electric: "#F8D030", grass: "#78C850", ice: "#98D8D8",
            fighting: "#C03028", poison: "#A040A0", ground: "#E0C068",
            flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
            rock: "#B8A038", ghost: "#705898", dragon: "#7038F8",
            dark: "#705848", steel: "#B8B8D0", fairy: "#EE99AC"
        };

        // Load search history from localStorage
        let searchHistory = JSON.parse(localStorage.getItem("pokeHistory")) || [];
        renderHistory();

        async function fetchPokemon(query) {
            const loading = document.getElementById("loading");
            const error = document.getElementById("error");
            const card = document.getElementById("card");

            // Reset states
            loading.classList.add("show");
            error.classList.remove("show");
            card.classList.remove("show");

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${String(query).toLowerCase()}`);

                if (!response.ok) {
                    throw new Error("Pokémon not found");
                }

                const data = await response.json();
                displayPokemon(data);
                addToHistory(data.name);

            } catch (error) {
                loading.classList.remove("show");
                error.classList.add("show");
                console.log("Error:", error.message);
            }
        }

        async function loadPokemonNames() {
            try {
                const response = await fetch("https://pokeapi.co/api/v2/pokemon?limit=1302");

                const data = await response.json();

                pokemonNames = data.results.map(pokemon => pokemon.name);

                console.log("Pokemons Names Loaded");

            } catch (error) {
                console.log("Error Loading Names:", error);
            }
        }

        function displayPokemon(data) {
            const loading = document.getElementById("loading");
            const card = document.getElementById("card");

            loading.classList.remove("show");
            card.classList.add("show");

            // Name and ID
            document.getElementById("pokeName").innerHTML = data.name;
            document.getElementById("pokeId").innerHTML = `#${String(data.id).padStart(3, "0")}`;

            // Images
            document.getElementById("pokeFront").src = data.sprites.front_default;
            document.getElementById("pokeBack").src = data.sprites.back_default || data.sprites.front_default;

            // Types
            const typesDiv = document.getElementById("types");
            typesDiv.innerHTML = "";
            data.types.forEach(t => {
                const badge = document.createElement("span");
                badge.classList.add("type-badge");
                badge.innerHTML = t.type.name;
                badge.style.backgroundColor = typeColors[t.type.name] || "#777";
                typesDiv.appendChild(badge);
            });

            // Stats
            const statsDiv = document.getElementById("stats");
            statsDiv.innerHTML = "";
            data.stats.forEach(s => {
                const statName = s.stat.name.replace("-", " ");
                const statValue = s.base_stat;
                const percentage = Math.min((statValue / 150) * 100, 100);

                statsDiv.innerHTML += `
                    <div class="stat-row">
                        <span class="stat-label">${statName}</span>
                        <div class="stat-bar-bg">
                            <div class="stat-bar-fill" style="width:${percentage}%"></div>
                        </div>
                        <span class="stat-value">${statValue}</span>
                    </div>
                `;
            });

            // Abilities
            const abilities = data.abilities.map(a => a.ability.name).join(", ");
            document.getElementById("abilities").innerHTML = `<strong>Abilities:</strong> ${abilities}`;
        }

        function searchPokemon() {
            const query = document.getElementById("searchInput").value.trim();
            if (query === "") {
                alert("Please enter a Pokémon name or ID!");
                return;
            }
            fetchPokemon(query);
        }

        function randomPokemon() {
            const randomId = Math.floor(Math.random() * 898) + 1;
            fetchPokemon(randomId);
        }

        function addToHistory(name) {
            searchHistory = searchHistory.filter(n => n !== name);
            searchHistory.unshift(name);
            searchHistory = searchHistory.slice(0, 5);

            localStorage.setItem("pokeHistory", JSON.stringify(searchHistory));
            renderHistory();
        }

        function renderHistory() {
            const historyList = document.getElementById("historyList");
            historyList.innerHTML = "";

            searchHistory.forEach(name => {
                const item = document.createElement("span");
                item.classList.add("history-item");
                item.innerHTML = name;
                item.addEventListener("click", () => fetchPokemon(name));
                historyList.appendChild(item);
            });
        }

        // SEARCH SUGGESTIONS
        document.getElementById("searchInput")
            .addEventListener("input", function () {

                const value = this.value.toLowerCase();
                const suggestions = document.getElementById("suggestions");

                suggestions.innerHTML = "";

                if (value.length === 0) return;

                const matches = pokemonNames
                    .filter(name => name.startsWith(value))
                    .slice(0, 5);

                matches.forEach(name => {
                    const item = document.createElement("div");
                    item.classList.add("suggestion-item");
                    item.innerHTML = name;

                    item.addEventListener("click", function () {
                        document.getElementById("searchInput").value = name;
                        suggestions.innerHTML = "";
                        fetchPokemon(name);
                    });

                    suggestions.appendChild(item);
                });
            });

        // Enter key to search
        document.getElementById("searchInput").addEventListener("keydown", function (e) {
            if (e.key === "Enter") searchPokemon();
        });

        // Load a default Pokémon on page start
        loadPokemonNames();
        fetchPokemon("pikachu");
    </script>
</body>
</html>
