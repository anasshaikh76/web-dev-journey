<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cors & API Auth Practise</title>
</head>

<body>

    <h2>Weather Widget Test</h2>
    <input type="text" id="cityInput" placeholder="Enter a city...">
    <button onclick="getWeather()">Get Weather</button>
    <div id="weatherOutput"></div>

    <script>

        // Problem 1 — Test CORS-allowed API

        async function test1() {
            const response = await fetch("https://jsonplaceholder.typicode.com/posts/1");
            const data = await response.json();
            console.log("✅ CORS allowed", data);
        }
        test1();

        // Problem 2 — Using your Weather API key

        async function test2() {
            const apiKey = "4487dc05f01e70af11c0f0df06ac6269";
            const city = "Hyderabad";

            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);

                if (!response.ok) {
                    throw new Error("API request failed - check your key");
                }

                const data = await response.json();
                console.log("Temperature:", data.main.temp + "°C");
                console.log("Weather", data.weather[0].description);
            } catch (error) {
                console.log("Error:", error.message);
            }
        }
        test2();
        // Note: If your key isn't activated yet (takes ~10 mins), you'll get an error — that's normal, just wait and retry!

        // Problem 3 — Handling 401 Unauthorized

        async function test3() {
            const wrongKey = "invalid12345";

            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=London&appid=${wrongKey}`);

            console.log("Status:", response.status);

            if (response.status === 401) {
                console.log("❌ Invalid API key!");
            }
        }
        test3();
        // Note: 401 status code specifically means "Unauthorized" — wrong or missing API key!

        // Problem 4 — Storing API key safely (concept)

        // ❌ BAD - never hardcode keys in real production apps
        const apiKey = "abc123xyz";

        // ✅ GOOD (you'll learn this properly later with Node.js)
        // Store in .env file, never commit to GitHub!
        // For now, just don't push real API keys to public GitHub repos!

        console.log("Remember: never share real Api key Publicly");
        // Important: For practice projects it's fine, but in real jobs you NEVER hardcode API keys in code that goes on GitHub!

        // Problem 5 — Build a mini Weather Widget

        async function getWeather() {
            const apiKey = "4487dc05f01e70af11c0f0df06ac6269";
            const city = document.getElementById("cityInput").value;

            const output = document.getElementById("weatherOutput");
            output.innerHTML = "⏳ Loading...";

            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);

                if (!response.ok) throw new Error("City not found!");

                const data = await response.json();

                output.innerHTML = `
                    <h3>${data.name}</h3>
                    <p>🌡️ ${data.main.temp}°C</p>
                    <p>☁️ ${data.weather[0].description}</p>
                    <p>💧 Humidity: ${data.main.humidity}%</p>
                `;
            } catch (error) {
                output.innerHTML = "❌ " + error.message;
            }
        }

        document.getElementById("cityInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") getWeather();
        });
    </script>
</body>

</html>
