<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anisearch - Anime Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e94560;
            --dark: #0f3460;
            --darker: #16213e;
            --darkest: #1a1a2e;
            --white: #ffffff;
            --gray: #aaaaaa;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--darkest);
            color: var(--white);
            min-height: 100vh;
        }

        .navbar {
            background: var(--darker);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: transparent;
            color: var(--gray);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-tab.active {
            background: var(--primary);
            color: white;
        }

        .nav-tab:hover:not(.active) {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .search-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .search-section h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .search-section h1 span {
            color: var(--primary);
        }

        .search-section p {
            color: var(--gray);
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto 15px;
            position: relative;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid var(--dark);
            border-radius: 30px;
            background: var(--darker);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            min-width: 0;
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        .search-box button {
            padding: 15px 30px;
            background: var(--primary);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
            white-space: nowrap;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        #suggestions {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background: var(--darker);
            border: 1px solid var(--dark);
            border-radius: 10px;
            z-index: 100;
            overflow: hidden;
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--dark);
            font-size: 14px;
            transition: background 0.2s;
        }

        .suggestion-item:hover {
            background: var(--dark);
            color: var(--primary);
        }

        .genre-filters {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .genre-btn {
            padding: 6px 16px;
            border: 1px solid var(--dark);
            border-radius: 15px;
            background: transparent;
            color: var(--gray);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .genre-btn:hover,
        .genre-btn.active {
            background: #031122;
            color: white;
            border-color: #031122;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .results-header h2 {
            font-size: 20px;
            color: var(--gray);
        }

        .results-header span {
            color: var(--primary);
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .anime-card {
            background: var(--darker);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid transparent;
        }

        .anime-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(233, 69, 96, 0.2);
            border-color: var(--primary);
        }

        .anime-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: var(--darkest);
        }

        .anime-card-info {
            padding: 12px;
        }

        .anime-card-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anime-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--gray);
        }

        .rating {
            color: #f39c12;
            font-weight: bold;
        }

        #loadMoreBtn {
            display: none;
            padding: 12px 30px;
            background: var(--primary);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 0 auto 30px;
        }

        #loadMoreBtn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        #loadMoreBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .load-more-container {
            text-align: center;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .modal {
            background: var(--darker);
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            margin: auto;
            overflow: hidden;
            border: 1px solid var(--dark);
        }

        .modal-header {
            display: flex;
            gap: 25px;
            padding: 25px;
            background: var(--darkest);
        }

        .modal-poster {
            width: 160px;
            height: 230px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
            background: var(--dark);
        }

        .modal-title-section {
            flex: 1;
            min-width: 0;
        }

        .modal-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .modal-title-jp {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .modal-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-genre {
            background: var(--dark);
            color: var(--primary);
        }

        .badge-type {
            background: var(--primary);
            color: white;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: var(--darker);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .stat-num {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-box .stat-label {
            font-size: 11px;
            color: var(--gray);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-watchlist {
            padding: 10px 20px;
            background: var(--primary);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }

        .btn-watchlist:hover {
            transform: scale(1.05);
        }

        .btn-watchlist.added {
            background: #2ecc71;
        }

        .btn-remove-watchlist {
            padding: 10px 20px;
            background: #e74c3c;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }

        .btn-remove-watchlist:hover {
            transform: scale(1.05);
        }

        .btn-close-modal {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--gray);
            border-radius: 20px;
            color: var(--gray);
            cursor: pointer;
            font-size: 14px;
            flex: 1;
            min-width: 100px;
            text-align: center;
        }

        .btn-close-modal:hover {
            border-color: white;
            color: white;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-synopsis {
            color: var(--gray);
            line-height: 1.8;
            font-size: 14px;
            margin-bottom: 20px;
            word-break: break-word;
        }

        .modal-section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--primary);
            border-bottom: 1px solid var(--dark);
            padding-bottom: 8px;
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .character-card {
            background: var(--darkest);
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
        }

        .character-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            background: var(--dark);
        }

        .character-card p {
            font-size: 11px;
            padding: 6px;
            color: var(--gray);
            word-break: break-word;
        }

        .character-card .char-role {
            font-size: 10px;
            color: var(--primary);
        }

        .studios-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .studio-tag {
            padding: 5px 14px;
            background: var(--dark);
            border-radius: 12px;
            font-size: 12px;
            color: var(--gray);
        }

        #watchlistSection {
            display: none;
        }

        #watchlistSection.show {
            display: block;
        }

        .watchlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-clear {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid #e74c3c;
            border-radius: 15px;
            color: #e74c3c;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-clear:hover {
            background: #e74c3c;
            color: white;
        }

        .empty-watchlist {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .empty-watchlist p {
            font-size: 18px;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--dark);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            text-align: center;
            color: #e74c3c;
            padding: 20px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .modal-error {
            color: #e74c3c;
            padding: 20px;
            text-align: center;
            font-size: 16px;
        }

        /* ===== RESPONSIVE: TABLETS & PHONES ===== */
        @media (max-width: 1024px) {
            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 12px 15px;
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .logo {
                font-size: 20px;
                text-align: center;
            }

            .nav-tabs {
                justify-content: center;
            }

            .nav-tab {
                padding: 6px 14px;
                font-size: 13px;
            }

            .container {
                padding: 20px 12px;
            }

            .search-section h1 {
                font-size: 28px;
            }

            .search-section p {
                font-size: 14px;
            }

            .search-box {
                flex-direction: column;
                gap: 8px;
            }

            .search-box input {
                padding: 12px 16px;
                font-size: 15px;
                border-radius: 25px;
            }

            .search-box button {
                padding: 12px 20px;
                font-size: 15px;
                border-radius: 25px;
            }

            .genre-filters {
                gap: 6px;
            }

            .genre-btn {
                padding: 5px 12px;
                font-size: 12px;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
                gap: 14px;
            }

            .anime-card img {
                height: 220px;
            }

            .anime-card-title {
                font-size: 13px;
            }

            .modal-header {
                flex-direction: column;
                align-items: center;
                padding: 18px;
                gap: 15px;
            }

            .modal-poster {
                width: 100%;
                max-width: 200px;
                height: 280px;
            }

            .modal-title {
                font-size: 22px;
                text-align: center;
            }

            .modal-title-jp {
                text-align: center;
            }

            .modal-badges {
                justify-content: center;
            }

            .modal-stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }

            .stat-box .stat-num {
                font-size: 16px;
            }

            .stat-box .stat-label {
                font-size: 10px;
            }

            .modal-actions {
                flex-direction: column;
                gap: 8px;
            }

            .btn-watchlist,
            .btn-remove-watchlist,
            .btn-close-modal {
                width: 100%;
                min-width: unset;
                padding: 12px;
                font-size: 14px;
            }

            .modal-body {
                padding: 18px;
            }

            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 12px;
            }

            .character-card img {
                height: 110px;
            }

            .character-card p {
                font-size: 10px;
            }

            #loadMoreBtn {
                width: 100%;
                padding: 14px;
                font-size: 15px;
                border-radius: 25px;
            }

            .watchlist-header h2 {
                font-size: 18px;
            }

            .btn-clear {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        /* ===== SMALL PHONES (320px - 480px) ===== */
        @media (max-width: 480px) {
            .logo {
                font-size: 18px;
            }

            .nav-tab {
                padding: 5px 10px;
                font-size: 12px;
            }

            .search-section h1 {
                font-size: 24px;
            }

            .search-box input {
                padding: 10px 14px;
                font-size: 14px;
            }

            .search-box button {
                padding: 10px 16px;
                font-size: 14px;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }

            .anime-card img {
                height: 190px;
            }

            .anime-card-title {
                font-size: 12px;
            }

            .anime-card-meta {
                font-size: 11px;
            }

            .modal-poster {
                height: 220px;
                max-width: 160px;
            }

            .modal-title {
                font-size: 20px;
            }

            .modal-stats {
                grid-template-columns: 1fr 1fr;
            }

            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
                gap: 10px;
            }

            .character-card img {
                height: 90px;
            }

            .character-card p {
                font-size: 9px;
                padding: 4px;
            }

            .genre-btn {
                padding: 4px 10px;
                font-size: 11px;
            }

            .results-header h2 {
                font-size: 16px;
            }

            .results-header p {
                font-size: 12px !important;
            }

            .container {
                padding: 15px 8px;
            }

            #suggestions .suggestion-item {
                padding: 10px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">🎌 AniSearch</div>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showSection('search', event)">🔍 Search</button>
            <button class="nav-tab" onclick="showSection('watchlist', event)">📋 Watchlist
                <span id="watchlistCount"></span>
            </button>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- SEARCH SECTION -->
        <div id="searchSection">
            <div class="search-section">
                <h1>Discover <span>Anime</span></h1>
                <p>Search from thousands of anime titles</p>

                <div class="search-box">
                    <input type="text" id="searchInput"
                        placeholder="Search anime... (e.g. One Piece, Naruto, Solo Leveling)" />
                    <button onclick="searchAnime()">Search</button>
                    <div id="suggestions"></div>
                </div>

                <!-- Genre Filters -->
                <div class="genre-filters">
                    <button class="genre-btn" onclick="searchByGenre(1, this)">Action</button>
                    <button class="genre-btn" onclick="searchByGenre(2, this)">Adventure</button>
                    <button class="genre-btn" onclick="searchByGenre(4, this)">Comedy</button>
                    <button class="genre-btn" onclick="searchByGenre(8, this)">Drama</button>
                    <button class="genre-btn" onclick="searchByGenre(10, this)">Fantasy</button>
                    <button class="genre-btn" onclick="searchByGenre(14, this)">Horror</button>
                    <button class="genre-btn" onclick="searchByGenre(7, this)">Mystery</button>
                    <button class="genre-btn" onclick="searchByGenre(22, this)">Romance</button>
                    <button class="genre-btn" onclick="searchByGenre(24, this)">Sci-Fi</button>
                    <button class="genre-btn" onclick="searchByGenre(36, this)">Slice of Life</button>
                </div>
            </div>

            <!-- Results -->
            <div id="resultsHeader" class="results-header" style="display:none;">
                <h2>Results for: <span id="searchTerm"></span></h2>
                <p style="color: var(--gray); font-size:14px;">Click any anime for details</p>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="color: var(--gray);">Searching anime...</p>
            </div>
            <div class="error-msg" id="errorMsg">❌ No anime found! Try a different search.</div>

            <div class="anime-grid" id="animeGrid"></div>

            <!-- Load More Button -->
            <div class="load-more-container">
                <button id="loadMoreBtn" onclick="loadMoreAnime()">Load More</button>
            </div>
        </div>

        <!-- WATCHLIST SECTION -->
        <div id="watchlistSection">
            <div class="watchlist-header">
                <h2>📋 My Watchlist</h2>
                <button class="btn-clear" onclick="watchlist.clearAll()">Clear All</button>
            </div>
            <div class="anime-grid" id="watchlistGrid"></div>
            <div class="empty-watchlist" id="emptyWatchlist" style="display:none;">
                <p style="font-size:48px;">📭</p>
                <p>Your watchlist is empty!</p>
                <p style="font-size:14px; margin-top:5px;">Search for anime and add them to your watchlist</p>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnClick(event)">
        <div class="modal" id="modal">
            <div class="modal-header">
                <img class="modal-poster" id="modalPoster" src="" alt="Poster" />
                <div class="modal-title-section">
                    <div class="modal-title" id="modalTitle"></div>
                    <div class="modal-title-jp" id="modalTitleJp"></div>
                    <div class="modal-badges" id="modalBadges"></div>
                    <div class="modal-stats" id="modalStats"></div>
                    <div class="modal-actions" id="modalActions">
                        <button class="btn-watchlist" id="watchlistBtn" onclick="toggleWatchlist()">+ Add to
                            Watchlist</button>
                        <button class="btn-close-modal" onclick="closeModal()">✕ Close</button>
                    </div>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-synopsis" id="modalSynopsis"></div>
                <div class="modal-section-title">👥 Characters</div>
                <div class="characters-grid" id="charactersGrid"></div>
                <div class="modal-section-title">🏢 Studios</div>
                <div class="studios-list" id="studiosList"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CLASSES
        // ==========================================

        class Anime {
            constructor(data) {
                this.id = data.mal_id;
                // ---- ENGLISH TITLE FIX ----
                this.title = data.title_english || data.title || 'Unknown Title';
                this.titleJp = data.title || '';
                this.synopsis = data.synopsis || 'No Synopsis Available.';
                this.poster = data.images?.jpg?.large_image_url || 'https://via.placeholder.com/200x280?text=No+Image';
                this.rating = data.score || 'N/A';
                this.episodes = data.episodes || '?';
                this.type = data.type || 'TV';
                this.status = data.status || '';
                this.genres = data.genres?.map(g => g.name) || [];
                this.studios = data.studios?.map(s => s.name) || [];
                this.year = data.year || 'Unknown';
            }

            getRatingStars() {
                if (this.rating === 'N/A') return 'N/A';
                return `⭐ ${this.rating}`;
            }
        }

        class Character {
            constructor(data) {
                this.name = data.character?.name || 'Unknown';
                this.role = data.role || '';
                this.image = data.character?.images?.jpg?.image_url || 'https://via.placeholder.com/120x130?text=No+Image';
                this.malId = data.character?.mal_id;
            }
        }

        class Watchlist {
            constructor() {
                this.items = JSON.parse(localStorage.getItem('animeWatchlist')) || [];
            }

            add(anime) {
                if (!this.has(anime.id)) {
                    this.items.push({
                        id: anime.id,
                        title: anime.title,
                        poster: anime.poster,
                        rating: anime.rating,
                        episodes: anime.episodes,
                        type: anime.type
                    });
                    this.save();
                    updateWatchlistCount();
                    return true;
                }
                return false;
            }

            remove(id) {
                this.items = this.items.filter(item => item.id !== id);
                this.save();
                updateWatchlistCount();
            }

            has(id) {
                return this.items.some(item => item.id === id);
            }

            getAll() {
                return this.items;
            }

            clearAll() {
                if (this.items.length === 0) return;
                if (confirm('Clear entire Watchlist?')) {
                    this.items = [];
                    this.save();
                    updateWatchlistCount();
                    renderWatchlist();
                }
            }

            save() {
                localStorage.setItem('animeWatchlist', JSON.stringify(this.items));
            }
        }

        // ==========================================
        // INITIALIZE
        // ==========================================

        const watchlist = new Watchlist();
        let currentAnime = null;
        let searchTimeout = null;
        let homePage = 1; // for pagination on homepage
        let isLoadingMore = false;

        updateWatchlistCount();
        loadNewAnime(); // changed from loadTrending

        // ==========================================
        // API FUNCTIONS
        // ==========================================

        // --- HOMEPAGE: New Seasonal Anime (instead of Trending) ---
        async function loadNewAnime() {
            showLoading(true);
            homePage = 1;
            document.getElementById('animeGrid').innerHTML = '';
            document.getElementById('loadMoreBtn').style.display = 'none';
            try {
                const response = await fetch(`https://api.jikan.moe/v4/seasons/now?limit=12&page=1`);
                const data = await response.json();
                const animeList = data.data.map(item => new Anime(item));
                renderAnimeGrid(animeList, false);
                document.getElementById('resultsHeader').style.display = 'flex';
                document.getElementById('searchTerm').innerHTML = '✨ New Seasonal Anime';
                document.getElementById('loadMoreBtn').style.display = 'block';
                document.getElementById('loadMoreBtn').disabled = false;
                document.getElementById('loadMoreBtn').textContent = 'Load More';
            } catch (error) {
                showError(true);
            } finally {
                showLoading(false);
            }
        }

        // --- Load More for Homepage ---
        async function loadMoreAnime() {
            if (isLoadingMore) return;
            isLoadingMore = true;
            const btn = document.getElementById('loadMoreBtn');
            btn.textContent = 'Loading...';
            btn.disabled = true;

            try {
                homePage++;
                const response = await fetch(`https://api.jikan.moe/v4/seasons/now?limit=12&page=${homePage}`);
                const data = await response.json();
                if (!data.data || data.data.length === 0) {
                    btn.textContent = 'No more anime';
                    btn.disabled = true;
                    isLoadingMore = false;
                    return;
                }
                const animeList = data.data.map(item => new Anime(item));
                renderAnimeGrid(animeList, true); // append
                btn.textContent = 'Load More';
                btn.disabled = false;
                if (data.data.length < 12) {
                    btn.textContent = 'All loaded!';
                    btn.disabled = true;
                }
            } catch (error) {
                alert('Failed to load more. Please try again.');
                btn.textContent = 'Load More';
                btn.disabled = false;
            } finally {
                isLoadingMore = false;
            }
        }

        // --- Search ---
        async function searchAnime() {
            const query = document.getElementById('searchInput').value.trim();
            if (query === '') {
                alert('Please enter an anime name!');
                return;
            }

            document.getElementById('suggestions').innerHTML = '';
            showLoading(true);
            showError(false);
            document.getElementById('animeGrid').innerHTML = '';
            document.getElementById('loadMoreBtn').style.display = 'none'; // hide load more on search

            try {
                const response = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=12&sfw=true`);
                const data = await response.json();

                if (!data.data || data.data.length === 0) {
                    showError(true);
                    return;
                }

                const animeList = data.data.map(item => new Anime(item));
                renderAnimeGrid(animeList, false);
                document.getElementById('resultsHeader').style.display = 'flex';
                document.getElementById('searchTerm').innerHTML = query;
            } catch (error) {
                showError(true);
            } finally {
                showLoading(false);
            }
        }

        // --- Genre Filters ---
        async function searchByGenre(genreId, btn) {
            document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            showLoading(true);
            showError(false);
            document.getElementById('animeGrid').innerHTML = '';
            document.getElementById('loadMoreBtn').style.display = 'none'; // hide load more on genre

            try {
                const response = await fetch(
                    `https://api.jikan.moe/v4/anime?genres=${genreId}&limit=12&order_by=score&sort=desc&sfw=true`
                );
                const data = await response.json();
                const animeList = data.data.map(item => new Anime(item));
                renderAnimeGrid(animeList, false);
                document.getElementById('resultsHeader').style.display = 'flex';
                document.getElementById('searchTerm').innerHTML = btn.textContent;
            } catch (error) {
                showError(true);
            } finally {
                showLoading(false);
            }
        }

        // --- Open Detail Modal ---
        async function openAnimeDetail(animeId) {
            document.getElementById('modalOverlay').classList.add('show');
            document.getElementById('modalTitle').innerHTML = 'Loading...';
            document.getElementById('modalSynopsis').innerHTML = 'Fetching details...';
            document.getElementById('charactersGrid').innerHTML = '<p style="color:var(--gray)">Loading characters...</p>';
            document.getElementById('studiosList').innerHTML = '';

            const actionsDiv = document.getElementById('modalActions');
            actionsDiv.innerHTML = `
                <button class="btn-watchlist" id="watchlistBtn" onclick="toggleWatchlist()">+ Add to Watchlist</button>
                <button class="btn-close-modal" onclick="closeModal()">✕ Close</button>
            `;

            try {
                const [animeRes, charsRes] = await Promise.all([
                    fetch(`https://api.jikan.moe/v4/anime/${animeId}/full`),
                    fetch(`https://api.jikan.moe/v4/anime/${animeId}/characters`)
                ]);

                if (!animeRes.ok || !charsRes.ok) {
                    throw new Error('Failed to fetch anime details.');
                }

                const animeData = await animeRes.json();
                const charsData = await charsRes.json();

                currentAnime = new Anime(animeData.data);
                const characters = (charsData.data || []).slice(0, 8).map(c => new Character(c));

                renderModal(currentAnime, characters);
            } catch (error) {
                console.error('Error loading details:', error);
                currentAnime = null;
                document.getElementById('modalTitle').innerHTML = '❌ Error';
                document.getElementById('modalSynopsis').innerHTML = `
                    <div class="modal-error">
                        Failed to load anime details.<br>
                        Please try again later or check your internet connection.
                    </div>
                `;
                document.getElementById('charactersGrid').innerHTML = '';
                document.getElementById('studiosList').innerHTML = '';
                document.getElementById('modalPoster').src = 'https://via.placeholder.com/200x280?text=Error';
                document.getElementById('modalTitleJp').innerHTML = '';
                document.getElementById('modalBadges').innerHTML = '';
                document.getElementById('modalStats').innerHTML = '';
                document.getElementById('modalActions').innerHTML = `
                    <button class="btn-close-modal" onclick="closeModal()">✕ Close</button>
                `;
            }
        }

        // ==========================================
        // RENDER FUNCTIONS
        // ==========================================

        function renderAnimeGrid(animeList, append = false) {
            const grid = document.getElementById('animeGrid');
            if (!append) {
                grid.innerHTML = '';
            }
            animeList.forEach(anime => {
                const card = document.createElement('div');
                card.classList.add('anime-card');
                card.innerHTML = `
                    <img src="${anime.poster}" alt="${anime.title}"
                         onerror="this.src='https://via.placeholder.com/200x280?text=No+Image'">
                    <div class="anime-card-info">
                        <div class="anime-card-title">${anime.title}</div>
                        <div class="anime-card-meta">
                            <span class="rating">${anime.getRatingStars()}</span>
                            <span>${anime.episodes} eps</span>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => openAnimeDetail(anime.id));
                grid.appendChild(card);
            });
        }

        function renderModal(anime, characters) {
            document.getElementById('modalPoster').src = anime.poster;
            document.getElementById('modalPoster').alt = anime.title;

            document.getElementById('modalTitle').innerHTML = anime.title;
            document.getElementById('modalTitleJp').innerHTML = anime.titleJp;

            const badgesDiv = document.getElementById('modalBadges');
            badgesDiv.innerHTML = '';
            const typeBadge = document.createElement('span');
            typeBadge.classList.add('badge', 'badge-type');
            typeBadge.innerHTML = anime.type;
            badgesDiv.appendChild(typeBadge);

            anime.genres.slice(0, 4).forEach(genre => {
                const badge = document.createElement('span');
                badge.classList.add('badge', 'badge-genre');
                badge.innerHTML = genre;
                badgesDiv.appendChild(badge);
            });

            document.getElementById('modalStats').innerHTML = `
                <div class="stat-box">
                    <div class="stat-num">${anime.getRatingStars()}</div>
                    <div class="stat-label">Rating</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num">${anime.episodes}</div>
                    <div class="stat-label">Episodes</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num">${anime.year}</div>
                    <div class="stat-label">Year</div>
                </div>
            `;

            document.getElementById('modalSynopsis').innerHTML = anime.synopsis;

            const actionsDiv = document.getElementById('modalActions');
            const isInWatchlist = watchlist.has(anime.id);
            if (isInWatchlist) {
                actionsDiv.innerHTML = `
                    <button class="btn-remove-watchlist" onclick="removeFromWatchlistAndModal(${anime.id})">🗑️ Remove from Watchlist</button>
                    <button class="btn-close-modal" onclick="closeModal()">✕ Close</button>
                `;
            } else {
                actionsDiv.innerHTML = `
                    <button class="btn-watchlist" id="watchlistBtn" onclick="toggleWatchlist()">+ Add to Watchlist</button>
                    <button class="btn-close-modal" onclick="closeModal()">✕ Close</button>
                `;
            }

            const charsGrid = document.getElementById('charactersGrid');
            charsGrid.innerHTML = '';
            if (characters.length === 0) {
                charsGrid.innerHTML = '<p style="color:var(--gray)">No character data available.</p>';
            } else {
                characters.forEach(char => {
                    const card = document.createElement('div');
                    card.classList.add('character-card');
                    card.innerHTML = `
                        <img src="${char.image}" alt="${char.name}"
                             onerror="this.src='https://via.placeholder.com/120x130?text=No+Image'">
                        <p>${char.name}</p>
                        <p class="char-role">${char.role}</p>
                    `;
                    charsGrid.appendChild(card);
                });
            }

            const studiosDiv = document.getElementById('studiosList');
            studiosDiv.innerHTML = '';
            if (anime.studios.length === 0) {
                studiosDiv.innerHTML = '<span style="color:var(--gray)">Unknown</span>';
            } else {
                anime.studios.forEach(studio => {
                    const tag = document.createElement('span');
                    tag.classList.add('studio-tag');
                    tag.innerHTML = studio;
                    studiosDiv.appendChild(tag);
                });
            }
        }

        function renderWatchlist() {
            const items = watchlist.getAll();
            const grid = document.getElementById('watchlistGrid');
            const empty = document.getElementById('emptyWatchlist');

            grid.innerHTML = '';
            if (items.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            items.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('anime-card');
                card.innerHTML = `
                    <img src="${item.poster}" alt="${item.title}"
                         onerror="this.src='https://via.placeholder.com/200x280?text=No+Image'">
                    <div class="anime-card-info">
                        <div class="anime-card-title">${item.title}</div>
                        <div class="anime-card-meta">
                            <span class="rating">⭐ ${item.rating}</span>
                            <button onclick="removeFromWatchlist(${item.id})"
                                style="background:#e74c3c; border:none; color:white;
                                padding:3px 8px; border-radius:8px; cursor:pointer; font-size:11px;">
                                Remove
                            </button>
                        </div>
                    </div>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        openAnimeDetail(item.id);
                    }
                });
                grid.appendChild(card);
            });
        }

        // ==========================================
        // UI FUNCTIONS
        // ==========================================

        function showSection(section, event) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            if (event && event.target) {
                event.target.classList.add('active');
            }

            if (section === 'search') {
                document.getElementById('searchSection').style.display = 'block';
                document.getElementById('watchlistSection').style.display = 'none';
                // If we are on search, show load more only if we are on homepage (no search query)
                // but we don't have a flag, so just hide it; it will be shown when loadNewAnime is called.
                // Actually, let's keep it hidden by default; loadNewAnime will show it.
            } else {
                document.getElementById('searchSection').style.display = 'none';
                document.getElementById('watchlistSection').style.display = 'block';
                renderWatchlist();
                document.getElementById('loadMoreBtn').style.display = 'none';
            }
        }

        function toggleWatchlist() {
            if (!currentAnime) return;

            if (watchlist.has(currentAnime.id)) {
                watchlist.remove(currentAnime.id);
            } else {
                watchlist.add(currentAnime);
            }

            // Update modal actions
            const animeId = currentAnime.id;
            const isNowInWatchlist = watchlist.has(animeId);
            const actionsDiv = document.getElementById('modalActions');
            if (isNowInWatchlist) {
                actionsDiv.innerHTML = `
                    <button class="btn-remove-watchlist" onclick="removeFromWatchlistAndModal(${animeId})">🗑️ Remove from Watchlist</button>
                    <button class="btn-close-modal" onclick="closeModal()">✕ Close</button>
                `;
            } else {
                actionsDiv.innerHTML = `
                    <button class="btn-watchlist" id="watchlistBtn" onclick="toggleWatchlist()">+ Add to Watchlist</button>
                    <button class="btn-close-modal" onclick="closeModal()">✕ Close</button>
                `;
            }
            updateWatchlistCount();
            renderWatchlist();
        }

        function removeFromWatchlistAndModal(id) {
            watchlist.remove(id);
            if (currentAnime && currentAnime.id === id) {
                const actionsDiv = document.getElementById('modalActions');
                actionsDiv.innerHTML = `
                    <button class="btn-watchlist" id="watchlistBtn" onclick="toggleWatchlist()">+ Add to Watchlist</button>
                    <button class="btn-close-modal" onclick="closeModal()">✕ Close</button>
                `;
            }
            updateWatchlistCount();
            renderWatchlist();
        }

        function removeFromWatchlist(id) {
            watchlist.remove(id);
            updateWatchlistCount();
            renderWatchlist();
            if (currentAnime && currentAnime.id === id) {
                const actionsDiv = document.getElementById('modalActions');
                actionsDiv.innerHTML = `
                    <button class="btn-watchlist" id="watchlistBtn" onclick="toggleWatchlist()">+ Add to Watchlist</button>
                    <button class="btn-close-modal" onclick="closeModal()">✕ Close</button>
                `;
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function closeModalOnClick(event) {
            if (event.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        }

        function updateWatchlistCount() {
            const count = watchlist.getAll().length;
            document.getElementById('watchlistCount').innerHTML = count > 0 ? ` (${count})` : '';
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showError(show) {
            document.getElementById('errorMsg').classList.toggle('show', show);
        }

        // ==========================================
        // SEARCH SUGGESTIONS (with English titles)
        // ==========================================

        document.getElementById('searchInput').addEventListener('input', function () {
            clearTimeout(searchTimeout);
            const value = this.value.trim();
            const suggestions = document.getElementById('suggestions');
            suggestions.innerHTML = '';

            if (value.length < 2) return;

            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(
                        `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(value)}&limit=5&sfw=true`
                    );
                    const data = await response.json();

                    data.data?.forEach(anime => {
                        const item = document.createElement('div');
                        item.classList.add('suggestion-item');
                        // ---- ENGLISH TITLE IN SUGGESTIONS ----
                        item.innerHTML = anime.title_english || anime.title;
                        item.addEventListener('click', () => {
                            document.getElementById('searchInput').value = anime.title_english || anime.title;
                            suggestions.innerHTML = '';
                            openAnimeDetail(anime.mal_id);
                        });
                        suggestions.appendChild(item);
                    });
                } catch (error) {
                    console.log('Suggestions error:', error);
                }
            }, 500);
        });

        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') searchAnime();
        });
    </script>
</body>

</html>
