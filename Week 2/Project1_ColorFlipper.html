<!DOCTYPE html>
<html>
<head>
    <title>Color Flipper</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial;
            transition: background-color 0.5s;
        }
        h1 {
            font-size: 40px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            margin: 10px;
            color: white;
            background-color: #333;
        }
        #colorDisplay {
            font-size: 30px;
            font-weight: bold;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Color Flipper</h1>
    <p id="colorDisplay">#f0f0f0</p>
    <button id="flipBtn">Flip Button</button>
    <button id="resetBtn">Reset</button>

    <script>
        // Array of colors to pick from
        const colors = [
            "#e74c3c", "#3498db", "#2ecc71", "#f39c12",
            "#9b59b6", "#1abc9c", "#e67e22", "#e91e63",
            "#00bcd4", "#8bc34a", "#ff5722", "#607d8b"
        ];

        document.getElementById("flipBtn").addEventListener("click", function() {

            // Pick random color from array
            let randomIndex = Math.floor(Math.random() * colors.length);
            let randomColor = colors[randomIndex];

            // Apply to background
            document.body.style.backgroundColor = randomColor;

            // Show color code
            document.getElementById("colorDisplay").innerHTML = randomColor;

            // Change text color to white or black based on background
            document.getElementById("colorDisplay").style.color = "white";

            console.log("Color Changed To: " + randomColor);
        });

        document.getElementById("resetBtn").addEventListener("click", function() {
            document.body.style.backgroundColor = "#f0f0f0";
            document.getElementById("colorDisplay").innerHTML = "#f0f0f0";
            document.getElementById("colorDisplay").style.color = "black";
            console.log("Color Reset!");
        })
    </script>
</body>
</html>
